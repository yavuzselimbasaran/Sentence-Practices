<body>
  <div class="app">
    <header>
      <h1>İngilizce Pratik Uygulaması</h1>

      </div>
      <div class="filters-row" aria-label="Çalışma yönü ve seviye filtresi">
        <div class="mode-filter">
          <button class="smallbtn" id="dirTrEn" onclick="setDirection('TR_EN')">TR-EN</button>
          <button class="smallbtn" id="dirEnTr" onclick="setDirection('EN_TR')">EN-TR</button>
        </div>
        <div class="level-dropdown">

          <div class="level-menu" id="levelMenu">
            <button class="smallbtn" id="levelAll" onclick="setLevelFilter('ALL')">Tümü</button>
            <button class="smallbtn" id="levelA1" onclick="setLevelFilter('A1')">A1</button>
            <button class="smallbtn" id="levelA2" onclick="setLevelFilter('A2')">A2</button>
            <button class="smallbtn" id="levelB1" onclick="setLevelFilter('B1')">B1</button>
            <button class="smallbtn" id="levelB2" onclick="setLevelFilter('B2')">B2</button>
            <button class="smallbtn" id="levelC1" onclick="setLevelFilter('C1')">C1</button>
          </div>
        </div>
        <button class="smallbtn wrong-tab" id="wrongReviewBtn" onclick="toggleWrongReview()">Yanlışlar</button>
        <button class="smallbtn fav-tab" id="favoriteReviewBtn" onclick="toggleFavoriteReview()">Favoriler</button>
        
      </div>
      <section class="word-card">
        <div class="label">Kelime</div>
        <div class="word-row"><div class="word speakable" id="word" onclick="speakCurrentWord()" title="Telaffuz için tıkla"></div><div class="type" id="type"></div><button class="heart-btn" id="favoriteBtn" onclick="toggleFavorite()" title="Favorilere ekle">♡</button></div>
        <div class="label" style="margin-top:14px">Türkçe Anlamı</div>
        <div class="meaning" id="meaning"></div>
      </section>
      <section class="sentence">
        <div class="label" id="sentenceLabel">Türkçe Cümle</div>
        <div class="tr-sentence speakable" id="trSentence" onclick="speakCurrentSentence()" title="Telaffuz için tıkla"></div>
      </section>
      <section class="answer-area">
        <div class="label" id="answerLabel">İngilizce cümleyi kelimelerle oluştur</div>
        <div class="answer-box" id="answerBox"><span class="placeholder">Kelimelere tıkla...</span></div>
        <div class="tiles" id="tiles"></div>
        <div class="label">veya elle yaz</div>
        <div class="input-row"><input id="manual" class="manual" placeholder="İngilizce cümleyi yaz..." onkeydown="if(event.key==='Enter') checkAnswer()" /></div>
        <div class="buttons">
          <button class="btn primary" onclick="checkAnswer()">Kontrol Et</button>
          <button class="btn ghost" onclick="clearAnswer()">Temizle</button>
          <button class="btn ghost" onclick="showAnswer()">Cevabı Göster</button>
          <button class="btn success" onclick="nextQuestion()">Devam Et</button>
          <button class="btn danger" onclick="resetProgress()">Sıfırla</button>
        </div>
        <div class="feedback" id="feedback"></div>
      </section>
      <div class="footer">Önce yönü (TR-EN / EN-TR), sonra seviyeyi seçerek çalış.</div>
    </main>
  </div>

let current = Number(localStorage.getItem('engPracticeCurrent') || 0);
let speechRate = Number(localStorage.getItem('engPracticeSpeechRate') || 0.9);
let randomMode = localStorage.getItem('engPracticeRandomMode') === '1';
let randomPool = JSON.parse(localStorage.getItem('engPracticeRandomPool') || '[]');
let levelFilter = localStorage.getItem('engPracticeLevelFilter') || 'ALL';
let direction = localStorage.getItem('engPracticeDirection') || 'TR_EN';
let reviewWrongOnly = localStorage.getItem('engPracticeReviewWrongOnly') === '1';
let reviewFavoritesOnly = localStorage.getItem('engPracticeReviewFavoritesOnly') === '1';
let selected = [];
let score = Number(localStorage.getItem('engPracticeScore') || 0);
let wrong = Number(localStorage.getItem('engPracticeWrong') || 0);
let checkedSet = new Set(JSON.parse(localStorage.getItem('engPracticeChecked') || '[]'));
let wrongSet = new Set(JSON.parse(localStorage.getItem('engPracticeWrongSet') || '[]'));
let favoriteSet = new Set(JSON.parse(localStorage.getItem('engPracticeFavoriteSet') || '[]'));

function getFilteredIndices(){
  return DATA.map((q,i)=>({q,i}))
    .filter(x=>levelFilter==='ALL' || x.q.level===levelFilter)
    .filter(x=>!reviewWrongOnly || wrongSet.has(String(x.q.no)))
    .filter(x=>!reviewFavoritesOnly || favoriteSet.has(String(x.q.no)))
    .map(x=>x.i);
}
function countWrongForCurrentLevel(){
  return DATA.filter(q=>(levelFilter==='ALL' || q.level===levelFilter) && wrongSet.has(String(q.no))).length;
}
function countFavoritesForCurrentLevel(){
  return DATA.filter(q=>(levelFilter==='ALL' || q.level===levelFilter) && favoriteSet.has(String(q.no))).length;
}
function getPositionInFiltered(){
  const list=getFilteredIndices();
  let pos=list.indexOf(current);
  if(pos===-1){current=list[0] ?? 0; pos=0;}
  return {list,pos};
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function wordsOf(s){return s.match(/\S+/g)||[]}
function promptText(q){return direction==='TR_EN' ? q.tr : q.en;}
function targetText(q){return direction==='TR_EN' ? q.en : q.tr;}
function directionLabel(){return direction==='TR_EN' ? 'İngilizce cümleyi kelimelerle oluştur' : 'Türkçe cümleyi kelimelerle oluştur';}
function normalize(s){return (s||'').toLowerCase().replace(/[’‘]/g,"'").replace(/[“”]/g,'"').replace(/\s+/g,' ').trim()}
function save(){localStorage.setItem('engPracticeCurrent',current);localStorage.setItem('engPracticeRandomMode',randomMode ? '1' : '0');localStorage.setItem('engPracticeRandomPool',JSON.stringify(randomPool));localStorage.setItem('engPracticeLevelFilter',levelFilter);localStorage.setItem('engPracticeDirection',direction);localStorage.setItem('engPracticeReviewWrongOnly',reviewWrongOnly ? '1' : '0');localStorage.setItem('engPracticeReviewFavoritesOnly',reviewFavoritesOnly ? '1' : '0');localStorage.setItem('engPracticeScore',score);localStorage.setItem('engPracticeWrong',wrong);localStorage.setItem('engPracticeChecked',JSON.stringify([...checkedSet]));localStorage.setItem('engPracticeWrongSet',JSON.stringify([...wrongSet]));localStorage.setItem('engPracticeFavoriteSet',JSON.stringify([...favoriteSet]));}

function setSpeechRate(value){
  speechRate=parseFloat(value)||0.9;
  localStorage.setItem('engPracticeSpeechRate',String(speechRate));
}
function stripForSpeech(text){
  return String(text||'').replace(/\([^)]*\)/g,'').replace(/[,/]/g,' ').replace(/\s+/g,' ').trim();
}
function speak(text, lang='en-US'){
  if(!('speechSynthesis' in window)) return;
  const clean=stripForSpeech(text);
  if(!clean) return;
  window.speechSynthesis.cancel();
  const utterance=new SpeechSynthesisUtterance(clean);
  utterance.lang=lang;
  utterance.rate=speechRate||0.9;
  utterance.pitch=1;
  const voices=window.speechSynthesis.getVoices ? window.speechSynthesis.getVoices() : [];
  const preferred=voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith('en'));
  if(preferred) utterance.voice=preferred;
  window.speechSynthesis.speak(utterance);
}
function speakCurrentWord(){
  const q=DATA[current];
  if(q) speak(q.word,'en-US');
}
function speakCurrentSentence(){
  const q=DATA[current];
  if(q) speak(q.en,'en-US');
}
function render(){
  const fp=getPositionInFiltered();
  const list=fp.list; const pos=fp.pos;
  const wrongReviewBtn=document.getElementById('wrongReviewBtn');
  const favoriteReviewBtn=document.getElementById('favoriteReviewBtn');
  if(wrongReviewBtn){wrongReviewBtn.textContent='Yanlışlar';wrongReviewBtn.classList.toggle('active',reviewWrongOnly);}
  if(favoriteReviewBtn){favoriteReviewBtn.textContent='Favoriler';favoriteReviewBtn.classList.toggle('active',reviewFavoritesOnly);}
  const speechRateSelect=document.getElementById('speechRateSelect');
  if(speechRateSelect) speechRateSelect.value=String(speechRate);
  if(list.length===0){
    document.getElementById('qNo').textContent=reviewWrongOnly ? 'Yanlışlar: 0' : (reviewFavoritesOnly ? 'Favoriler: 0' : 'Soru 0 / 0');
    document.getElementById('percent').textContent='%0';
    document.getElementById('bar').style.width='0%';
    document.getElementById('word').textContent=reviewFavoritesOnly ? 'Favori yok' : 'Yanlış kalmadı';
    document.getElementById('type').textContent='';
    document.getElementById('meaning').textContent=reviewWrongOnly ? 'Yanlış yaptığın kelime kalmadı. Normal çalışmaya dönebilirsin.' : (reviewFavoritesOnly ? 'Favorilere eklediğin kelime yok. Kalp simgesiyle favori ekleyebilirsin.' : '');
    document.getElementById('trSentence').textContent='';
    document.getElementById('tiles').innerHTML='';
    document.getElementById('answerBox').innerHTML='<span class="placeholder">Normal çalışmaya dönmek için aktif sekmeye tekrar bas.</span>';
    document.getElementById('manual').value='';
    document.getElementById('feedback').className='feedback';
    save();
    return;
  }
  const q=DATA[current]; selected=[];
  document.getElementById('word').textContent=q.word;
  document.getElementById('type').textContent = q.type;
  const favBtn=document.getElementById('favoriteBtn');
  if(favBtn){const isFav=favoriteSet.has(String(q.no));favBtn.textContent=isFav?'♥':'♡';favBtn.classList.toggle('active',isFav);favBtn.title=isFav?'Favorilerden çıkar':'Favorilere ekle';}
  document.getElementById('meaning').textContent=q.meaning;
  document.getElementById('sentenceLabel').textContent = direction==='TR_EN' ? 'Türkçe Cümle' : 'İngilizce Cümle';
  document.getElementById('trSentence').textContent=promptText(q);
  document.getElementById('answerLabel').textContent=directionLabel();
  document.getElementById('manual').placeholder = direction==='TR_EN' ? 'İngilizce cümleyi yaz...' : 'Türkçe cümleyi yaz...';
  document.getElementById('qNo').textContent=randomMode ? `Rastgele: ${pos+1} / ${list.length}` : `Soru ${pos+1} / ${list.length}`;
  const pct=Math.round(((pos+1)/list.length)*100);
  document.getElementById('percent').textContent=randomMode ? '🔀' : `%${pct}`;
  document.getElementById('bar').style.width=randomMode ? '100%' : pct+'%';
  document.getElementById('totalPill').textContent=`Toplam: ${list.length}`;
  document.getElementById('scorePill').textContent=`Doğru: ${score}`;
  document.getElementById('wrongPill').textContent=`Yanlış: ${wrong}`;
  const modeBtn=document.getElementById('modeBtn');
  if(modeBtn){modeBtn.textContent=randomMode?'🔀 Rastgele: Açık':'🔀 Rastgele: Kapalı';modeBtn.classList.toggle('active',randomMode);}
  ['ALL','A1','A2','B1','B2','C1'].forEach(l=>{const b=document.getElementById('level'+(l==='ALL'?'All':l));if(b)b.classList.toggle('active',levelFilter===l);});
  document.getElementById('levelMenuBtn').textContent=`Seviye: ${levelFilter==='ALL'?'Tümü':levelFilter} ▾`;
  document.getElementById('dirTrEn').classList.toggle('active',direction==='TR_EN');
  document.getElementById('dirEnTr').classList.toggle('active',direction==='EN_TR');
  if(wrongReviewBtn){wrongReviewBtn.textContent='Yanlışlar';wrongReviewBtn.classList.toggle('active',reviewWrongOnly);}
  if(favoriteReviewBtn){favoriteReviewBtn.textContent='Favoriler';favoriteReviewBtn.classList.toggle('active',reviewFavoritesOnly);}
  document.getElementById('manual').value='';document.getElementById('feedback').className='feedback';document.getElementById('feedback').innerHTML='';
  renderAnswerBox(); renderTiles(q); save();
}
function renderAnswerBox(){const box=document.getElementById('answerBox');box.innerHTML='';if(selected.length===0){const sp=document.createElement('span');sp.className='placeholder';sp.textContent='Kelimelere tıkla...';box.appendChild(sp);return;}selected.forEach((item,idx)=>{const b=document.createElement('button');b.className='chosen';b.textContent=item.word;b.onclick=()=>{selected.splice(idx,1);document.querySelector(`[data-tile-id="${item.id}"]`)?.classList.remove('hidden');renderAnswerBox();syncManual();};box.appendChild(b);});}
function renderTiles(q){const wrap=document.getElementById('tiles');wrap.innerHTML='';shuffle(wordsOf(targetText(q))).forEach((w,i)=>{const id=`t${current}_${i}_${Math.random().toString(36).slice(2)}`;const b=document.createElement('button');b.className='tile';b.textContent=w;b.dataset.tileId=id;b.onclick=()=>{selected.push({word:w,id});b.classList.add('hidden');renderAnswerBox();syncManual();};wrap.appendChild(b);});}
function syncManual(){document.getElementById('manual').value=selected.map(x=>x.word).join(' ')}
function checkAnswer(){
  const q=DATA[current];
  const manual=document.getElementById('manual').value.trim();
  const answer=manual || selected.map(x=>x.word).join(' ');
  const correct=targetText(q);
  const ok=normalize(answer)===normalize(correct);
  const fb=document.getElementById('feedback');

  if(ok){
    fb.className='feedback ok';
    if(reviewWrongOnly && wrongSet.has(String(q.no))){
      wrongSet.delete(String(q.no));
      fb.innerHTML='✅ Doğru! Bu kelime yanlışlar listesinden çıkarıldı.';
    }else{
      fb.innerHTML='✅ Doğru!';
    }
    if(!checkedSet.has(q.no+':ok')){score++;checkedSet.add(q.no+':ok')}
  }else{
    fb.className='feedback no';
    fb.innerHTML=`❌ Yanlış.<div class="correct-line">Doğru cevap: ${correct}</div>`;
    wrongSet.add(String(q.no));
    if(!checkedSet.has(q.no+':wrong')){wrong++;checkedSet.add(q.no+':wrong')}
  }

  save();
  document.getElementById('scorePill').textContent=`Doğru: ${score}`;
  document.getElementById('wrongPill').textContent=`Yanlış: ${wrong}`;
  const wrongReviewBtn=document.getElementById('wrongReviewBtn');
  if(wrongReviewBtn){wrongReviewBtn.textContent='Yanlışlar';wrongReviewBtn.classList.toggle('active',reviewWrongOnly);}
  if(favoriteReviewBtn){favoriteReviewBtn.textContent='Favoriler';favoriteReviewBtn.classList.toggle('active',reviewFavoritesOnly);}
}
function showAnswer(){const q=DATA[current];const correct=targetText(q);document.getElementById('feedback').className='feedback ok';document.getElementById('feedback').innerHTML=`Cevap:<div class="correct-line">${correct}</div>`;document.getElementById('manual').value=correct;speak(q.en,'en-US');}
function clearAnswer(){selected=[];document.getElementById('manual').value='';document.getElementById('feedback').className='feedback';document.getElementById('feedback').innerHTML='';document.querySelectorAll('.tile.hidden').forEach(x=>x.classList.remove('hidden'));renderAnswerBox();}
function getRandomIndex(){const list=getFilteredIndices();if(!Array.isArray(randomPool)||randomPool.length===0){randomPool=list.filter(i=>i!==current);}if(randomPool.length===0)return current;const pick=Math.floor(Math.random()*randomPool.length);return randomPool.splice(pick,1)[0];}
function toggleRandomMode(){randomMode=!randomMode;randomPool=[];save();render();}
function toggleLevelMenu(){document.getElementById('levelMenu')?.classList.toggle('open');}
function setDirection(dir){direction=dir;randomPool=[];save();render();}
function setLevelFilter(level){document.getElementById('levelMenu')?.classList.remove('open');levelFilter=level;randomPool=[];const list=getFilteredIndices();current=list[0] ?? 0;save();render();}
function toggleWrongReview(){
  reviewWrongOnly=!reviewWrongOnly;
  if(reviewWrongOnly) reviewFavoritesOnly=false;
  randomPool=[];
  const list=getFilteredIndices();
  current=list[0] ?? 0;
  save();render();
}
function toggleFavoriteReview(){
  reviewFavoritesOnly=!reviewFavoritesOnly;
  if(reviewFavoritesOnly) reviewWrongOnly=false;
  randomPool=[];
  const list=getFilteredIndices();
  current=list[0] ?? 0;
  save();render();
}
function toggleFavorite(){
  const q=DATA[current];
  const key=String(q.no);
  if(favoriteSet.has(key)){favoriteSet.delete(key);}else{favoriteSet.add(key);}
  save();render();
}
function nextQuestion(){if(randomMode){current=getRandomIndex();}else{const {list,pos}=getPositionInFiltered();current=list[(pos+1)%list.length];}render();}
function prevQuestion(){if(randomMode){current=getRandomIndex();}else{const {list,pos}=getPositionInFiltered();current=list[(pos-1+list.length)%list.length];}render();}
function resetProgress(){if(confirm('İlerleme ve skor sıfırlansın mı?')){current=0;score=0;wrong=0;checkedSet=new Set();wrongSet=new Set();favoriteSet=new Set();reviewWrongOnly=false;reviewFavoritesOnly=false;localStorage.removeItem('engPracticeCurrent');localStorage.removeItem('engPracticeScore');localStorage.removeItem('engPracticeWrong');localStorage.removeItem('engPracticeChecked');localStorage.removeItem('engPracticeWrongSet');localStorage.removeItem('engPracticeFavoriteSet');localStorage.removeItem('engPracticeReviewWrongOnly');localStorage.removeItem('engPracticeReviewFavoritesOnly');randomPool=[];localStorage.removeItem('engPracticeRandomPool');render();}}
render();
</script>

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js");
  });
}
</script>
